[vendor]
# Please specify at least one of: vendor.ollama, vendor.openai

[vendor.ollama]
host = "http://gpu:11434"

[vendor.openai]
api_key = "sk-proj-XXX"

[query]
# type can be "singleton-text", "singleton-image", "batch-text", or "batch-image"
type = "batch-text" 

# target can be "ollama" or "openai"
# please also specify the corresponding vendor above!
target = "ollama"

# the model name and temperature (if supported) go here:
model_name = "gemma3:4b"
temperature = 0

[query.details]
# query type can be "singleton-text", "singleton-image", "batch-text", or "batch-image", see above
# different query types need different query details

# query type "singleton-text" needs instructions, context, and question
#instructions = "You are a helpful assistant. Please answer the question using the context below."
#context = "Dragan Ismailovic and Yasmina Kovzova are married. Their children are called Sohar (girl) and Boban (boy)"
#question = "What is the name of Dragan Ismailovic' and Yasmina Kovzova's daughter?"

# query type "singleton-image" needs instructions, question, and an image file
#instructions = "You are a visual assistant. Please answer specifically and as briefly as possible to the question."
#question = "Do you see raspberries? Please only answer 'yes', 'no', or 'uncertain'."
#image = "demo/berries.png"

# query type "batch-text" needs csv_file, csv_file_separator, colname_query_id, colname_instructions, colname_contexts, and colname_questions
#   csv_file contains the queries to be passed to the LLM
csv_file = "demo/input/queries.csv"
csv_file_separator = ","
colname_query_id = "qid"
colname_instructions = "instructions"
colname_questions = "questions"
colname_contexts = "contexts"

# query type "batch-image" needs instructions, question, and an image directory
#instructions = ""
#question = "Text recognition: "
#img_dir = "demo/input"
#img_dir_glob = "text_*.jpg"
#img_qid = "filename-regex"    # 'filename' (default) or 'filename-regex'
#img_qid_regex = "\\d{2}"      # use matching sequence as query id 

[out]
# mode directs the output to standard output ("standard") or a csv file ("file")
mode = "file"                                           # "file" or "standard"
csv_file = "demo/output/out3.csv"                       # if file exists, out4.csv will be created
csv_file_separator = ";"                                # the default is "," (comma); you can choose between comma, semicolon, and tab ("\t")
response_to_file_length_threshold = 300                 # default 300, i.e. answers with more than 300 characters are written into separate file `response_to_file_filename`
response_to_file_filename = "~qid~_llm_response.txt"    # `~qid~` is a placeholder and will be replaced by query id 